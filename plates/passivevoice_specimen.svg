<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" style="background-color: #f5f2e8;">
  <!-- Title -->
  <text x="50" y="40" font-family="serif" font-size="18" fill="#3a3a3a" font-style="italic">Constructio evasoria</text>
  <text x="50" y="60" font-family="serif" font-size="14" fill="#3a3a3a">pressed specimen, syntactic mount</text>
  
  <!-- Main sentence line -->
  <line x1="100" y1="150" x2="500" y2="150" stroke="#3a3a3a" stroke-width="2"/>
  
  <!-- Subject (window) -->
  <rect x="150" y="130" width="80" height="40" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <text x="190" y="155" font-family="serif" font-size="14" fill="#3a3a3a" text-anchor="middle">window</text>
  <text x="190" y="185" font-family="serif" font-size="11" fill="#6a6a6a" text-anchor="middle">(patient)</text>
  
  <!-- Auxiliary -->
  <rect x="250" y="130" width="60" height="40" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <text x="280" y="155" font-family="serif" font-size="14" fill="#3a3a3a" text-anchor="middle">was</text>
  <text x="280" y="185" font-family="serif" font-size="11" fill="#6a6a6a" text-anchor="middle">(aux)</text>
  
  <!-- Past participle -->
  <rect x="330" y="130" width="80" height="40" fill="none" stroke="#3a3a3a" stroke-width="1"/>
  <text x="370" y="155" font-family="serif" font-size="14" fill="#3a3a3a" text-anchor="middle">broken</text>
  <text x="370" y="185" font-family="serif" font-size="11" fill="#6a6a6a" text-anchor="middle">(participle)</text>
  
  <!-- Optional by-phrase (dotted) -->
  <rect x="430" y="130" width="100" height="40" fill="none" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="480" y="155" font-family="serif" font-size="14" fill="#8a8a8a" text-anchor="middle">(by agent)</text>
  <text x="480" y="185" font-family="serif" font-size="11" fill="#9a9a9a" text-anchor="middle">deleted</text>
  
  <!-- Arrows showing transformation -->
  <path d="M 190,120 Q 190,90 280,90" fill="none" stroke="#3a3a3a" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="235" y="85" font-family="serif" font-size="11" fill="#6a6a6a" text-anchor="middle">promotion</text>
  
  <!-- Agent deletion arrow -->
  <path d="M 480,200 Q 480,240 480,280" fill="none" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead-grey)"/>
  <text x="485" y="250" font-family="serif" font-size="11" fill="#9a9a9a">agent</text>
  <text x="485" y="265" font-family="serif" font-size="11" fill="#9a9a9a">deletion</text>
  
  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3a3a3a"/>
    </marker>
    <marker id="arrowhead-grey" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8a8a8a"/>
    </marker>
  </defs>
  
  <!-- Specimen label -->
  <rect x="420" y="320" width="140" height="50" fill="#f9f6f0" stroke="#8a7a6a" stroke-width="1"/>
  <text x="490" y="340" font-family="serif" font-size="10" fill="#3a3a3a" text-anchor="middle">Coll: M. Haversham</text>
  <text x="490" y="355" font-family="serif" font-size="10" fill="#3a3a3a" text-anchor="middle">Status: Irruptive</text>
</svg>
