<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Herbarium paper background -->
  <rect width="400" height="500" fill="#f4ede1"/>
  
  <!-- Title block, iron-gall ink -->
  <text x="200" y="30" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#2c2416" font-style="italic">Particula correctionis-obliquae</text>
  <text x="200" y="48" font-family="Georgia, serif" font-size="10" text-anchor="middle" fill="#2c2416">T. Cartwright, obs.</text>
  
  <!-- Mounting tape strips, ochre -->
  <rect x="80" y="90" width="30" height="4" fill="#c9a05f" opacity="0.7"/>
  <rect x="290" y="90" width="30" height="4" fill="#c9a05f" opacity="0.7"/>
  <rect x="80" y="350" width="30" height="4" fill="#c9a05f" opacity="0.7"/>
  <rect x="290" y="350" width="30" height="4" fill="#c9a05f" opacity="0.7"/>
  
  <!-- Specimen: two speech paths diverging from single source -->
  <g stroke="#2c2416" stroke-width="1.5" fill="none">
    <!-- Single stem -->
    <path d="M 200 320 L 200 240"/>
    
    <!-- Verificatory branch (thinning) -->
    <path d="M 200 240 Q 160 200, 140 140" stroke-dasharray="3,2" opacity="0.6"/>
    <text x="110" y="135" font-family="Georgia, serif" font-size="9" fill="#2c2416" opacity="0.6">verificatory</text>
    <text x="105" y="147" font-family="Georgia, serif" font-size="8" fill="#2c2416" opacity="0.6">(declining)</text>
    
    <!-- Corrective branch (abundant) -->
    <path d="M 200 240 Q 240 200, 260 140" stroke-width="2"/>
    <text x="235" y="135" font-family="Georgia, serif" font-size="9" fill="#2c2416">corrective</text>
    <text x="240" y="147" font-family="Georgia, serif" font-size="8" fill="#2c2416">(abundant)</text>
  </g>
  
  <!-- Call notations -->
  <text x="50" y="280" font-family="Georgia, serif" font-size="10" fill="#2c2416" font-style="italic">Calls:</text>
  <text x="55" y="295" font-family="Courier New, monospace" font-size="9" fill="#2c2416">"Did you actually—"</text>
  <text x="55" y="310" font-family="Courier New, monospace" font-size="9" fill="#2c2416">"Actually, I—"</text>
  
  <!-- Collection stamp, faded red -->
  <circle cx="320" cy="420" r="35" fill="none" stroke="#a04040" stroke-width="1.5" opacity="0.5"/>
  <text x="320" y="415" font-family="Georgia, serif" font-size="8" text-anchor="middle" fill="#a04040" opacity="0.5">ABUNDANT</text>
  <text x="320" y="428" font-family="Georgia, serif" font-size="7" text-anchor="middle" fill="#a04040" opacity="0.5">status verified</text>
  
  <!-- Field note -->
  <text x="50" y="400" font-family="Georgia, serif" font-size="8" fill="#2c2416" opacity="0.7">Range: professional registers,</text>
  <text x="50" y="412" font-family="Georgia, serif" font-size="8" fill="#2c2416" opacity="0.7">workplace correspondence</text>
  
  <!-- Sign notation -->
  <text x="50" y="440" font-family="Georgia, serif" font-size="8" fill="#2c2416" opacity="0.7">Sign: hearer's flinch when</text>
  <text x="50" y="452" font-family="Georgia, serif" font-size="8" fill="#2c2416" opacity="0.7">verificatory misheard as corrective</text>
  
  <!-- Catalog number -->
  <text x="200" y="485" font-family="Courier New, monospace" font-size="8" text-anchor="middle" fill="#2c2416" opacity="0.5">SLN-PART-047</text>
</svg>
