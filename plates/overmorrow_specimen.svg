<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <!-- PLATE VII: pressed specimen, overmorrow. Society of Lexical Naturalists.
       First pressing of a truly Extinct organism (no captive population).
       One wild cutting (Coverdale Bible, 1535); one mount prepared and left
       empty, the captive specimen never having existed.
       Palette: paper #EFE6CF / iron-gall ink #3A3128 / stamp red #9C4A3C / tape #D9C89E / pencil #8B8378 -->

  <!-- herbarium sheet -->
  <rect width="700" height="520" fill="#EFE6CF"/>

  <!-- paper aging: blotches, a ring, restrained; this sheet is older than most -->
  <ellipse cx="585" cy="450" rx="74" ry="34" fill="#D9C89E" opacity="0.18"/>
  <ellipse cx="90" cy="100" rx="52" ry="32" fill="#D9C89E" opacity="0.16"/>
  <ellipse cx="340" cy="505" rx="96" ry="16" fill="#C9B68A" opacity="0.12"/>
  <ellipse cx="150" cy="430" rx="40" ry="26" fill="#C9B68A" opacity="0.10"/>
  <circle cx="620" cy="300" r="22" fill="none" stroke="#B89B6B" stroke-width="2.5" opacity="0.14"/>
  <path d="M 30 250 q 6 60 -2 120" fill="none" stroke="#B89B6B" stroke-width="1" opacity="0.12"/>

  <!-- hand-ruled double border, slightly imperfect -->
  <rect x="18" y="18" width="664" height="484" fill="none" stroke="#3A3128" stroke-width="1.6"/>
  <path d="M 28 28 L 671.5 28.6 L 671 491.5 L 28.5 491 Z" fill="none" stroke="#3A3128" stroke-width="0.7"/>

  <!-- plate heading -->
  <text x="350" y="56" text-anchor="middle" font-size="15" letter-spacing="6" fill="#3A3128">PLATE VII</text>
  <line x1="296" y1="66" x2="404" y2="66" stroke="#3A3128" stroke-width="0.7"/>
  <text x="350" y="84" text-anchor="middle" font-size="10.5" letter-spacing="2.5" fill="#3A3128">PRESSED SPECIMEN — WILD-COLLECTED; NO CAPTIVE STOCK</text>

  <!-- accession stamp, rotated, faded red -->
  <g transform="rotate(4 135 132)" opacity="0.76">
    <rect x="40" y="106" width="190" height="52" fill="none" stroke="#9C4A3C" stroke-width="2"/>
    <rect x="44" y="110" width="182" height="44" fill="none" stroke="#9C4A3C" stroke-width="0.8"/>
    <text x="135" y="126" text-anchor="middle" font-size="9.5" letter-spacing="1.6" fill="#9C4A3C" font-family="'Courier New', monospace" font-weight="bold">SOC. LEXICAL NATURALISTS</text>
    <text x="135" y="140" text-anchor="middle" font-size="9.5" letter-spacing="1.6" fill="#9C4A3C" font-family="'Courier New', monospace" font-weight="bold">ACCESSIONED · No. 0007</text>
    <text x="135" y="151" text-anchor="middle" font-size="7.5" letter-spacing="1" fill="#9C4A3C" font-family="'Courier New', monospace">AUDITUM, NUMQUAM VISUM</text>
  </g>

  <!-- status stamp, faded red, struck once firmly with a ghost -->
  <g transform="rotate(-8 540 150)" opacity="0.74">
    <rect x="466" y="128" width="184" height="34" fill="none" stroke="#9C4A3C" stroke-width="2.4"/>
    <text x="558" y="151" text-anchor="middle" font-size="15" letter-spacing="6" fill="#9C4A3C" font-family="'Courier New', monospace" font-weight="bold">EXTINCT</text>
  </g>
  <g transform="rotate(-6.5 548 156)" opacity="0.18">
    <rect x="472" y="134" width="184" height="34" fill="none" stroke="#9C4A3C" stroke-width="2.4"/>
    <text x="564" y="157" text-anchor="middle" font-size="15" letter-spacing="6" fill="#9C4A3C" font-family="'Courier New', monospace" font-weight="bold">EXTINCT</text>
  </g>

  <!-- SPECIMEN A: wild-collected, Coverdale Bible 1535 -->
  <g transform="rotate(-1.6 300 222)">
    <rect x="92" y="196" width="420" height="64" fill="#3A3128" opacity="0.10" rx="2"/>
    <rect x="88" y="190" width="420" height="64" fill="#F2E9CF" stroke="#C9B68A" stroke-width="0.8"/>
    <text x="298" y="210" text-anchor="middle" font-size="9" fill="#8B8378" font-style="italic">… and it shall come to passe</text>
    <text x="298" y="235" text-anchor="middle" font-size="25" letter-spacing="1.5" fill="#3A3128">ouermorow</text>
    <text x="298" y="250" text-anchor="middle" font-size="9" fill="#8B8378" font-style="italic">[gloss: the daye after to morowe]</text>
  </g>
  <!-- tape, specimen A -->
  <g opacity="0.55">
    <rect x="70" y="186" width="56" height="20" fill="#D9C89E" stroke="#C9B68A" stroke-width="0.5" transform="rotate(-36 98 196)"/>
    <rect x="474" y="236" width="56" height="20" fill="#D9C89E" stroke="#C9B68A" stroke-width="0.5" transform="rotate(-36 502 246)"/>
  </g>
  <!-- pin, specimen A -->
  <line x1="296" y1="196" x2="304" y2="178" stroke="#3A3128" stroke-width="1.4"/>
  <circle cx="305" cy="176" r="3" fill="#3A3128"/>
  <ellipse cx="293" cy="199" rx="6" ry="2" fill="#3A3128" opacity="0.18"/>
  <!-- field tag, specimen A -->
  <g font-family="'Courier New', monospace" fill="#3A3128" transform="rotate(-1.6 555 230)">
    <rect x="524" y="206" width="128" height="46" fill="#F7F0DC" stroke="#3A3128" stroke-width="0.8"/>
    <text x="532" y="221" font-size="8">SPEC. A — WILD</text>
    <text x="532" y="233" font-size="8">COVERDALE, 1535</text>
    <text x="532" y="245" font-size="8">printed folio</text>
  </g>

  <!-- SPECIMEN B: captive — mount prepared, specimen never existed -->
  <g transform="rotate(1.4 300 320)">
    <rect x="88" y="292" width="420" height="58" fill="none" stroke="#C9B68A" stroke-width="0.8" stroke-dasharray="3 3"/>
    <!-- mounting corners holding nothing -->
    <path d="M 96 300 L 116 300 L 96 314 Z" fill="#D9C89E" opacity="0.55"/>
    <path d="M 500 300 L 480 300 L 500 314 Z" fill="#D9C89E" opacity="0.55"/>
    <path d="M 96 342 L 116 342 L 96 328 Z" fill="#D9C89E" opacity="0.55"/>
    <path d="M 500 342 L 480 342 L 500 328 Z" fill="#D9C89E" opacity="0.55"/>
    <text x="298" y="326" text-anchor="middle" font-size="11" letter-spacing="3" fill="#8B8378" font-style="italic">[ no captive specimen ]</text>
    <text x="298" y="341" text-anchor="middle" font-size="8.5" letter-spacing="1" fill="#8B8378" font-style="italic">mount prepared; population never bred</text>
  </g>
  <!-- field tag, specimen B -->
  <g font-family="'Courier New', monospace" fill="#3A3128" transform="rotate(1.4 555 324)">
    <rect x="524" y="302" width="128" height="46" fill="#F7F0DC" stroke="#3A3128" stroke-width="0.8"/>
    <text x="532" y="317" font-size="8">SPEC. B — CAPTIVE</text>
    <text x="532" y="329" font-size="8">NONE EXTANT</text>
    <text x="532" y="341" font-size="8">never collected</text>
  </g>

  <!-- pencil annotation, collector's hand -->
  <text x="92" y="378" font-size="11.5" fill="#8B8378" font-style="italic" transform="rotate(-1 92 378)">cf. übermorgen — congener, living, far side of the Channel. ours did not cross back.</text>
  <path d="M 94 384 q 150 5 300 1" fill="none" stroke="#8B8378" stroke-width="0.6" opacity="0.7"/>

  <!-- collection label, typed, bottom-right -->
  <g font-family="'Courier New', monospace" fill="#3A3128">
    <rect x="368" y="368" width="296" height="118" fill="#F7F0DC" stroke="#3A3128" stroke-width="1.1"/>
    <rect x="372" y="372" width="288" height="110" fill="none" stroke="#3A3128" stroke-width="0.5"/>
    <text x="516" y="392" text-anchor="middle" font-size="9.5" letter-spacing="2">A FIELD GUIDE TO THE WORDS</text>
    <line x1="384" y1="400" x2="648" y2="400" stroke="#3A3128" stroke-width="0.5"/>
    <text x="384" y="418" font-size="10.5" font-style="italic" font-family="Georgia, serif">Vocabulum desuetudinis</text>
    <text x="384" y="434" font-size="9">STATUS: Extinct; no captive stock.</text>
    <text x="384" y="446" font-size="9">NICHE held now by a 4-word phrase</text>
    <text x="384" y="458" font-size="9">        ("the day after tomorrow").</text>
    <text x="384" y="474" font-size="9">COLL. &amp; DET.: A. Pellucid, vi.2026</text>
  </g>

  <!-- folio caption -->
  <text x="60" y="456" font-size="10" letter-spacing="1.5" fill="#3A3128">OVERMORROW</text>
  <text x="60" y="470" font-size="8.5" fill="#8B8378" font-style="italic">The organism is not depicted. It is not anywhere. This is the last sheet that held it.</text>
</svg>
