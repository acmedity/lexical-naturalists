<svg xmlns="http://www.w3.org/2000/svg" width="176" height="224" class="svgbob"><style>.svgbob line, .svgbob path, .svgbob circle, .svgbob rect, .svgbob polygon {
    stroke: black;
    stroke-width: 2;
    stroke-opacity: 1;
    fill-opacity: 1;
    stroke-linecap: round;
    stroke-linejoin: miter;
}
.svgbob text {
    white-space: pre;
    fill: black;
    font-family: Iosevka Fixed, monospace;
    font-size: 14px;
}
.svgbob rect.backdrop {
    stroke: none;
    fill: white;
}
.svgbob .broken {
    stroke-dasharray: 8;
}
.svgbob .filled {
    fill: black;
}
.svgbob .bg_filled {
    fill: white;
    stroke-width: 1;
}
.svgbob .nofill {
    fill: white;
}
.svgbob .end_marked_arrow {
    marker-end: url(#arrow);
}
.svgbob .start_marked_arrow {
    marker-start: url(#arrow);
}
.svgbob .end_marked_diamond {
    marker-end: url(#diamond);
}
.svgbob .start_marked_diamond {
    marker-start: url(#diamond);
}
.svgbob .end_marked_circle {
    marker-end: url(#circle);
}
.svgbob .start_marked_circle {
    marker-start: url(#circle);
}
.svgbob .end_marked_open_circle {
    marker-end: url(#open_circle);
}
.svgbob .start_marked_open_circle {
    marker-start: url(#open_circle);
}
.svgbob .end_marked_big_open_circle {
    marker-end: url(#big_open_circle);
}
.svgbob .start_marked_big_open_circle {
    marker-start: url(#big_open_circle);
}<!--separator--></style><defs><marker id="arrow" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><polygon points="0,0 0,4 4,2 0,0"></polygon></marker><marker id="diamond" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><polygon points="0,2 2,0 4,2 2,4 0,2"></polygon></marker><marker id="circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><circle cx="4" cy="4" r="2" class="filled"></circle></marker><marker id="open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><circle cx="4" cy="4" r="2" class="bg_filled"></circle></marker><marker id="big_open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><circle cx="4" cy="4" r="3" class="bg_filled"></circle></marker></defs><rect class="backdrop" x="0" y="0" width="176" height="224"></rect><text x="82" y="44" >&</text><text x="42" y="60" >|</text><text x="122" y="60" >|</text><line x1="64" y1="72" x2="104" y2="72" class="solid"></line><text x="34" y="156" >[*S.</text><text x="74" y="156" >tironianum*]</text><text x="34" y="172" >Abundant</text><text x="34" y="188" >det.</text><text x="74" y="188" >Blackwater</text><text x="66" y="204" >Ankerwycke</text><text x="162" y="188" >&</text><g><line x1="64" y1="16" x2="104" y2="16" class="solid"></line><line x1="64" y1="16" x2="48" y2="48" class="solid"></line><line x1="104" y1="16" x2="120" y2="48" class="solid"></line></g><g><line x1="84" y1="48" x2="84" y2="112" class="solid"></line><line x1="64" y1="112" x2="104" y2="112" class="solid"></line></g><g><line x1="44" y1="64" x2="44" y2="88" class="solid"></line><line x1="44" y1="88" x2="64" y2="128" class="solid"></line><line x1="124" y1="64" x2="124" y2="88" class="solid"></line><line x1="124" y1="88" x2="104" y2="128" class="solid"></line><line x1="64" y1="128" x2="104"