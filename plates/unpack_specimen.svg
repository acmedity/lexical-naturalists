<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Herbarium paper background -->
  <rect width="400" height="300" fill="#f4f1e8"/>
  
  <!-- Mounting tape corners -->
  <rect x="20" y="20" width="30" height="8" fill="#d4c5a0" opacity="0.7"/>
  <rect x="350" y="20" width="30" height="8" fill="#d4c5a0" opacity="0.7"/>
  <rect x="20" y="272" width="30" height="8" fill="#d4c5a0" opacity="0.7"/>
  <rect x="350" y="272" width="30" height="8" fill="#d4c5a0" opacity="0.7"/>
  
  <!-- Specimen label -->
  <rect x="250" y="230" width="120" height="50" fill="#fdfcf8" stroke="#8b7355" stroke-width="0.5"/>
  <text x="260" y="245" font-family="Courier" font-size="9" fill="#3a3a3a">Verbum valisii-</text>
  <text x="260" y="255" font-family="Courier" font-size="9" fill="#3a3a3a">aperiendi</text>
  <text x="260" y="268" font-family="Courier" font-size="7" fill="#6a6a6a">Naturalized</text>
  
  <!-- The specimen: "unpack" with its characteristic traces -->
  <text x="80" y="80" font-family="Georgia" font-size="24" fill="#2c2c2c" font-style="italic">unpack</text>
  
  <!-- Bullet point traces (the diagnostic field sign) -->
  <circle cx="110" cy="110" r="2" fill="#4a4a4a"/>
  <line x1="120" y1="110" x2="180" y2="110" stroke="#6a6a6a" stroke-width="0.5" opacity="0.6"/>
  
  <circle cx="110" cy="130" r="2" fill="#4a4a4a"/>
  <line x1="120" y1="130" x2="160" y2="130" stroke="#6a6a6a" stroke-width="0.5" opacity="0.6"/>
  
  <circle cx="110" cy="150" r="2" fill="#4a4a4a"/>
  <line x1="120" y1="150" x2="170" y2="150" stroke="#6a6a6a" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Rising intonation mark (the call) -->
  <path d="M 190 75 Q 200 70, 210 68" stroke="#8b4513" stroke-width="1" fill="none" opacity="0.7"/>
  <text x="215" y="70" font-family="Georgia" font-size="8" fill="#8b4513" opacity="0.7">↗</text>
  
  <!-- Collection stamp -->
  <circle cx="320" y="60" r="25" fill="none" stroke="#c67171" stroke-width="1" opacity="0.4"/>
  <text x="310" y="58" font-family="Georgia" font-size="7" fill="#c67171" opacity="0.4">SOC.</text>
  <text x="308" y="68" font-family="Georgia" font-size="7" fill="#c67171" opacity="0.4">LEX.</text>
</svg>
